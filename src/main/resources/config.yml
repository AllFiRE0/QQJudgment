# Черный список регионов WorldGuard где PVP запрещено даже во время судной ночи
blacklisted-regions:
  - "Spawn"
  - "mine_1"

# Ограничения во время судной ночи
restrictions:
  sleep: false
  elytraFlight: false
  fly: false
  god: false

# Защита от AFK
afk-protection: false
afk-commands:
  - "asConsole! kick %player_name% вы отдыхали во время судной ночи"
  - "asPlayer! menu_rules"

# Запрещенные команды
blocked-commands:
  - "homes"
  - "rtp"
  - "notarget"
  - "fly"
  - "flyc"

# Настройки BossBar
bossbar:
  enabled: true
  color: "RED"
  text: "<gradient:#FF0000:#FFAA00>Судная ночь закончится через %time%</gradient>"
  segments: 12
  update-ticks: 5

# Формат таймера (HH:mm:ss, mm:ss, HH:mm, ss)
timer-format: "HH:mm:ss"

# Спавн мобов (экспериментально)
mob-spawning:
  enabled: false
  delay-ticks: 400
  bypass-permission: "qqjudgment.bypass.mobspawn"
  radius: 15
  mobs:
    zombie: 10
    skeleton: 5

# Сообщения
messages:
  prefix: "&8[&6СуднаяНочь&8] &r"
  judgment-started: "&cСудная ночь началась! &7Продолжительность: &e%seconds% &7секунд"
  judgment-stopped: "&aСудная ночь остановлена досрочно!"
  judgment-ended: "&aСудная ночь закончилась!"
  already-active: "&cСудная ночь уже активна!"
  not-active: "&cСудная ночь не активна!"
  invalid-seconds: "&cУкажите корректное количество секунд!"
  no-permission: "&cУ вас нет прав на выполнение этой команды!"
  pvp-enabled-during-judgment: "actionbar! &c⚔ СУДНАЯ НОЧЬ - PVP ВКЛЮЧЕН ⚔"
  command-blocked: "&cВы не можете использовать эту команду во время судной ночи!"
  cant-sleep: "title! &cВы не можете спать во время судной ночи!"
  cant-fly: "&cВы не можете летать во время судной ночи!"
  mob-spawn-start: "&cНачинается спавн мобов вокруг игроков!"
