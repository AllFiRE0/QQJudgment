# ┌─────────────────────────────────────────────────────────────┐
# │                    ОСНОВНЫЕ НАСТРОЙКИ                        │
# └─────────────────────────────────────────────────────────────┘

# Черный список регионов WorldGuard где PVP запрещено даже во время судной ночи
# Игроки не смогут убивать друг друга в этих регионах
blacklisted-regions:
  - "Spawn"      # Название региона из WorldGuard
  - "mine_1"     # Можно добавлять сколько угодно

# ┌─────────────────────────────────────────────────────────────┐
# │                    ОГРАНИЧЕНИЯ                               │
# └─────────────────────────────────────────────────────────────┘

restrictions:
  # Запрет на сон во время судной ночи
  # true - игроки не могут спать
  # false - сон разрешен
  sleep: false
  
  # Запрет на полет на элитре
  elytraFlight: false
  
  # Запрет на полет (режим /fly)
  fly: false
  
  # Режим бога (неуязвимость)
  god: false

# ┌─────────────────────────────────────────────────────────────┐
# │                    ЗАЩИТА ОТ AFK                             │
# └─────────────────────────────────────────────────────────────┘

# Защита от бездействующих игроков
afk-protection: false  # true - включена, false - выключена

# Команды, выполняемые при AFK
# asConsole! - команда от имени консоли
# asPlayer! - команда от имени игрока
afk-commands:
  - "asConsole! kick %player_name% вы отдыхали во время судной ночи"
  - "asPlayer! menu_rules"

# ┌─────────────────────────────────────────────────────────────┐
# │                    ЗАПРЕЩЕННЫЕ КОМАНДЫ                       │
# └─────────────────────────────────────────────────────────────┘

# Команды, которые нельзя использовать во время судной ночи
# (без слеша, просто название команды)
blocked-commands:
  - "homes"
  - "rtp"
  - "notarget"
  - "fly"
  - "flyc"
  - "spawn"
  - "tpa"

# ┌─────────────────────────────────────────────────────────────┐
# │                    НАСТРОЙКИ BOSSBAR                         │
# └─────────────────────────────────────────────────────────────┘

bossbar:
  # Включить/выключить боссбар
  enabled: true
  
  # Цвет полосы
  # Доступные: BLUE, GREEN, PINK, PURPLE, RED, WHITE, YELLOW
  color: "RED"
  
  # Текст боссбара
  # Поддерживает: HEX, &f, miniMessage, градиенты
  # %time% - автоматически заменяется на оставшееся время
  text: "<gradient:#FF0000:#FFAA00>Судная ночь закончится через %time%</gradient>"
  
  # Количество секций в полосе
  # Доступно: 1, 6, 10, 12, 20
  segments: 12
  
  # Частота обновления в тиках (20 тиков = 1 секунда)
  # Меньше значение = плавнее анимация, но больше нагрузка
  update-ticks: 5

# ┌─────────────────────────────────────────────────────────────┐
# │                    ФОРМАТ ТАЙМЕРА                            │
# └─────────────────────────────────────────────────────────────┘

# Формат отображения времени
# Доступные форматы:
#   HH:mm:ss - часы:минуты:секунды (01:30:45)
#   mm:ss     - минуты:секунды (90:45)
#   HH:mm     - часы:минуты (01:30)
#   ss        - только секунды (5445)
timer-format: "HH:mm:ss"

# Текст, возвращаемый заполнителями когда судная ночь не активна
fallback-message: "Судная ночь не началась"

# ┌─────────────────────────────────────────────────────────────┐
# │                    СПАВН МОБОВ (ЭКСПЕРИМЕНТАЛЬНО)            │
# └─────────────────────────────────────────────────────────────┘

# ВНИМАНИЕ: Эта функция может вызывать лаги на серверах с большим
# количеством игроков. Используйте с осторожностью!
mob-spawning:
  # Включить спавн мобов вокруг игроков
  enabled: false
  
  # Интервал между спавнами в тиках (20 тиков = 1 секунда)
  # Рекомендуемое значение: 400 (20 секунд)
  delay-ticks: 400
  
  # Право для обхода спавна мобов
  bypass-permission: "qqjudgment.bypass.mobspawn"
  
  # Радиус спавна мобов вокруг игрока
  radius: 15
  
  # Мобы и их количество, спавнящееся за один раз
  # Доступные типы: ZOMBIE, SKELETON, SPIDER, CREEPER, HUSK и т.д.
  mobs:
    zombie: 10
    skeleton: 5
    spider: 3
    husk: 2

# ┌─────────────────────────────────────────────────────────────┐
# │                    СООБЩЕНИЯ                                 │
# └─────────────────────────────────────────────────────────────┘

messages:
  # Префикс для обычных сообщений
  prefix: "&8[&6СуднаяНочь&8] &r"
  
  # Сообщение о начале судной ночи
  # %seconds% - количество секунд
  judgment-started: "&cСудная ночь началась! &7Продолжительность: &e%seconds% &7секунд"
  
  # Сообщение о досрочной остановке
  judgment-stopped: "&aСудная ночь остановлена досрочно!"
  
  # Сообщение об окончании
  judgment-ended: "&aСудная ночь закончилась!"
  
  # Ошибка - уже активна
  already-active: "&cСудная ночь уже активна!"
  
  # Ошибка - не активна
  not-active: "&cСудная ночь не активна!"
  
  # Ошибка - неверные секунды
  invalid-seconds: "&cУкажите корректное количество секунд!"
  
  # Ошибка - нет прав
  no-permission: "&cУ вас нет прав на выполнение этой команды!"
  
  # Уведомление о включении PVP (экшнбар)
  pvp-enabled-during-judgment: "actionbar! &c⚔ СУДНАЯ НОЧЬ - PVP ВКЛЮЧЕН ⚔"
  
  # Уведомление о заблокированной команде
  command-blocked: "&cВы не можете использовать эту команду во время судной ночи!"
  
  # Уведомление о запрете сна (тайтл)
  cant-sleep: "title! &cВы не можете спать во время судной ночи!"
  
  # Уведомление о запрете полета
  cant-fly: "&cВы не можете летать во время судной ночи!"
  
  # Сообщение о начале спавна мобов
  mob-spawn-start: "&cНачинается спавн мобов вокруг игроков!"

# ┌─────────────────────────────────────────────────────────────┐
# │                    ЗАПОЛНИТЕЛИ (PlaceholderAPI)              │
# └─────────────────────────────────────────────────────────────┘

# Доступные заполнители для использования в других плагинах:
#
# %qqjudgment_end_fallbackMsg%         - секунды до конца или fallback
# %qqjudgment_time_end_fallbackMsg%    - время в формате до конца или fallback
# %qqjudgment_time_end%                - время в формате (без fallback)
# %qqjudgment_seconds_end%             - секунды до конца (без fallback)
# %qqjudgment_is_active%               - активна ли судная ночь (true/false)
#
# %qqjudgment_top_1_fallbackMsg%       - 1 место в топе (имя: очки)
# %qqjudgment_top_2_fallbackMsg%       - 2 место в топе
# ... до top_10_fallbackMsg%
#
# %qqjudgment_death_fallbackMsg%       - кол-во смертей игрока или fallback
# %qqjudgment_deaths%                  - кол-во смертей (без fallback)
#
# %qqjudgment_kills_players_fallbackMsg% - убийства игроков или fallback
# %qqjudgment_kills_players%           - убийства игроков (без fallback)
#
# %qqjudgment_kills_mobs_fallbackMsg%  - убийства мобов или fallback
# %qqjudgment_kills_mobs%              - убийства мобов (без fallback)
#
# %qqjudgment_total_kills_fallbackMsg% - всего убийств или fallback
# %qqjudgment_total_kills%             - всего убийств (без fallback)
#
# %qqjudgment_remaining_percent%       - процент оставшегося времени

# ┌─────────────────────────────────────────────────────────────┐
# │                    ПРАВА (PERMISSIONS)                       │
# └─────────────────────────────────────────────────────────────┘

# qqjudgment.use                    - использование команды /qqjudgment
# qqjudgment.start                  - запуск судной ночи
# qqjudgment.stop                   - остановка судной ночи
# qqjudgment.placeholder.parse      - использование /qqjudgment papi
#
# qqjudgment.bypass.pvp             - обход запрета PVP в регионах
# qqjudgment.bypass.sleep           - возможность спать во время СН
# qqjudgment.bypass.elytra          - полет на элитре во время СН
# qqjudgment.bypass.fly             - полет (/fly) во время СН
# qqjudgment.bypass.god             - неуязвимость во время СН
# qqjudgment.bypass.commands        - использование заблокированных команд
# qqjudgment.bypass.mobspawn        - обход спавна мобов

# ┌─────────────────────────────────────────────────────────────┐
# │                    ПРИМЕРЫ ИСПОЛЬЗОВАНИЯ                     │
# └─────────────────────────────────────────────────────────────┘

# Запуск судной ночи на 5 минут (300 секунд):
# /qqjudgment 300 start
#
# Запуск без сообщений (silent mode):
# /qqjudgment 600 start -s
#
# Остановка:
# /qqjudgment 0 stop
#
# Проверка заполнителей:
# /qqjudgment papi У вас %qqjudgment_kills_players% убийств
#
# Использование в других плагинах (например, в Tab):
# header: "&6⚔ Судная ночь: &e%qqjudgment_time_end_fallbackMsg%"
